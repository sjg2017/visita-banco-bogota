<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIRA - Levantamiento Banco de Bogotá</title>
    
    <!-- Tailwind para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js para el radar -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 3px solid #10b981; color: #065f46; font-weight: 700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .q-card { transition: transform 0.2s; }
        .q-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="text-slate-900 pb-24">

    <!-- Header -->
    <header class="bg-slate-900 text-white sticky top-0 z-50 shadow-lg p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-lg flex items-center justify-center text-slate-900 font-bold">B</div>
                <div>
                    <h1 class="font-bold text-lg leading-none">Banco de Bogotá</h1>
                    <p id="syncLabel" class="text-[10px] text-emerald-400 font-bold tracking-widest uppercase">Conectando...</p>
                </div>
            </div>
            <div class="w-32 bg-slate-800 rounded-full h-3 overflow-hidden border border-slate-700">
                <div id="progressBar" class="bg-emerald-500 h-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- Visualización Radar -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-[10px] font-bold text-slate-400 uppercase text-center mb-4 tracking-widest italic">Madurez de Sistemas Detectada</h2>
            <div class="h-64 flex justify-center">
                <canvas id="radarChart"></canvas>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 overflow-x-auto no-scrollbar mb-6 pb-2">
            <button onclick="changeTab('contexto')" id="t-contexto" class="t-btn px-5 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold tab-active">Contexto</button>
            <button onclick="changeTab('iluminacion')" id="t-iluminacion" class="t-btn px-5 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold text-slate-500">Iluminación</button>
            <button onclick="changeTab('hvac')" id="t-hvac" class="t-btn px-5 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold text-slate-500">HVAC</button>
            <button onclick="changeTab('electrico')" id="t-electrico" class="t-btn px-5 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold text-slate-500">Baterías</button>
            <button onclick="changeTab('piloto')" id="t-piloto" class="t-btn px-5 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold text-slate-500">Piloto</button>
        </div>

        <!-- Preguntas -->
        <div id="questionsContainer" class="space-y-3">
            <!-- Cargado por JS -->
        </div>

        <!-- Error Alert -->
        <div id="errView" class="hidden mt-8 p-6 bg-red-50 border border-red-100 rounded-3xl text-center">
            <p class="text-red-700 font-bold">⚠️ Fallo de Conexión Cloud</p>
            <p class="text-[10px] text-red-500 uppercase mt-2">Habilita "Anonymous Auth" en tu consola de Firebase.</p>
        </div>
    </main>

    <!-- Status Bar -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 p-3 flex justify-center items-center gap-3">
        <div id="statusDot" class="w-2 h-2 bg-slate-300 rounded-full"></div>
        <span id="statusTxt" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Iniciando...</span>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN DE TU PROYECTO
        const firebaseConfig = {
            apiKey: "AIzaSyB0d2y_GTja-q16PJTgOx0oE1xnasHh_y8",
            authDomain: "bancobogota-cira.firebaseapp.com",
            projectId: "bancobogota-cira",
            storageBucket: "bancobogota-cira.firebasestorage.app",
            messagingSenderId: "388810777038",
            appId: "1:388810777038:web:589047e2f943afebc8cb9f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const docRef = doc(db, "artifacts", "visita-banco-bogota", "public", "data", "checklist", "global");

        const sections = {
            contexto: [
                { id: 'q1', label: 'Sistemas actuales identificados' },
                { id: 'q2', label: 'Modo de operación levantado' },
                { id: 'q3', label: 'Nivel de automatización actual' },
                { id: 'q4', label: 'Ubicación física de servidores de datos' },
                { id: 'q5', label: 'Mapeo de principales dolores técnicos' }
            ],
            iluminacion: [
                { id: 'i1', label: '¿Manual o Automático?' },
                { id: 'i2', label: '¿Existen horarios configurados?' },
                { id: 'i3', label: 'Potencial de ahorro detectado' }
            ],
            hvac: [
                { id: 'h1', label: 'Censo de equipos (Referencia/Potencia)' },
                { id: 'h2', label: 'Modo de activación (BMS/Manual)' },
                { id: 'h3', label: 'Revisión de Set Points' }
            ],
            electrico: [
                { id: 'r1', label: 'Ref. baterías y monitoreo RCI' },
                { id: 'r2', label: 'Presencia de SCADA y protocolos Modbus' },
                { id: 'r3', label: 'Protocolo de pruebas (Manual/Auto)' }
            ],
            piloto: [
                { id: 'p1', label: 'Espacio en tableros confirmado' },
                { id: 'p2', label: 'Permiso para toma de fotos/planos' },
                { id: 'p3', label: 'Validación de responsable técnico' }
            ]
        };

        let dbData = {};
        let activeTab = 'contexto';
        let chart;

        // Auth
        signInAnonymously(auth).catch(() => {
            document.getElementById('errView').classList.remove('hidden');
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('syncLabel').innerText = "EN LÍNEA";
                document.getElementById('statusDot').className = "w-2 h-2 bg-emerald-500 rounded-full animate-pulse";
                document.getElementById('statusTxt').innerText = "Sincronización en vivo activa";
                
                onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        dbData = snap.data();
                        render();
                        updateChart();
                    }
                });
            }
        });

        window.changeTab = (t) => {
            activeTab = t;
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('tab-active', 'text-slate-900'));
            document.getElementById('t-' + t).classList.add('tab-active', 'text-slate-900');
            render();
        };

        function render() {
            const cont = document.getElementById('questionsContainer');
            cont.innerHTML = "";
            sections[activeTab].forEach(item => {
                const isChecked = dbData[item.id] || false;
                const div = document.createElement('div');
                div.className = `q-card flex items-center gap-4 p-5 rounded-2xl border cursor-pointer ${isChecked ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-100 shadow-sm'}`;
                div.innerHTML = `
                    <div class="w-6 h-6 rounded-md border-2 flex items-center justify-center ${isChecked ? 'bg-emerald-500 border-emerald-500' : 'border-slate-300'}">
                        ${isChecked ? '<span class="text-white text-[10px] font-bold">✓</span>' : ''}
                    </div>
                    <span class="text-sm font-medium ${isChecked ? 'text-emerald-900' : 'text-slate-700'}">${item.label}</span>
                `;
                div.onclick = () => toggle(item.id);
                cont.appendChild(div);
            });

            // Progress Bar
            const allIds = Object.values(sections).flat().map(i => i.id);
            const done = allIds.filter(id => dbData[id]).length;
            const pct = (done / allIds.length) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
        }

        async function toggle(id) {
            dbData[id] = !dbData[id];
            render();
            updateChart();
            await setDoc(docRef, dbData, { merge: true });
        }

        // Radar Logic
        function initChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Contexto', 'Luz', 'HVAC', 'Baterías', 'Piloto'],
                    datasets: [{
                        data: [0,0,0,0,0],
                        backgroundColor: 'rgba(16, 185, 129, 0.15)',
                        borderColor: '#10b981',
                        borderWidth: 2,
                        pointBackgroundColor: '#10b981'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: { beginAtZero: true, max: 100, ticks: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateChart() {
            if (!chart) return;
            const vals = Object.keys(sections).map(key => {
                const items = sections[key];
                const checked = items.filter(i => dbData[i.id]).length;
                return (checked / items.length) * 100;
            });
            chart.data.datasets[0].data = vals;
            chart.update();
        }

        initChart();
        render();
    </script>
</body>
</html>
